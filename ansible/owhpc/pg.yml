---
- name: Install PostgreSQL and configure a database on Ubuntu
  hosts: 151.181.203.21
  become: yes  # To run tasks with sudo

  tasks:
    - name: Update package cache
      apt:
        update_cache: yes

    - name: Install PostgreSQL and the PostgreSQL contrib package
      apt:
        name: 
          - postgresql
          - postgresql-contrib

    - name: Start and enable the PostgreSQL service
      systemd:
        name: postgresql
        enabled: yes
        state: started

    - name: Create a PostgreSQL database
      postgresql_db:
        name: owcluster
        login_user: postgres
        login_password: P@$$w0rd123
